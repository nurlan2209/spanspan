services:
  postgres:
    image: postgres:16-alpine
    container_name: ortus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ortus}
      POSTGRES_USER: ${POSTGRES_USER:-ortus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ortus -d ortus"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: ortus-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

volumes:
  pg_data:
  uploads_data:
